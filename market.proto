syntax = "proto3";

package marketplace;

// --- Client Facing Services ---

service MarketplaceService {
  // Product Operations
  rpc ListProducts(ListRequest) returns (ListResponse);
  rpc AddProduct(AddRequest) returns (ActionResponse);
  
  // Order Operations (Requires Consistency)
  rpc PlaceOrder(OrderRequest) returns (ActionResponse);
  
  // System/Scaling Info
  rpc GetSystemStatus(Empty) returns (StatusResponse);
}

// --- Internal Replication Services ---

service ReplicationService {
  // Used for Primary-Backup or Quorum synchronization
  rpc SyncState(StateUpdate) returns (SyncResponse);
  
  // Heartbeat for failure detection
  rpc Heartbeat(Ping) returns (Pong);
  
  // New replica joining the cluster
  rpc JoinCluster(JoinRequest) returns (JoinResponse);
}

// --- Message Definitions ---

message Product {
  string id = 1;
  string name = 2;
  double price = 3;
  int32 stock_quantity = 4;
}

message ListRequest {
  string category = 1;
}

message ListResponse {
  repeated Product products = 1;
}

message AddRequest {
  Product product = 1;
}

message OrderRequest {
  string product_id = 1;
  int32 quantity = 2;
  string user_id = 3;
}

message ActionResponse {
  bool success = 1;
  string message = 2;
}

message StateUpdate {
  uint64 sequence_number = 1;
  Product updated_product = 2;
}

message SyncResponse {
  bool acknowledged = 1;
}

message JoinRequest {
  string replica_id = 1;
}

message JoinResponse {
  repeated Product initial_state = 1;
  uint64 last_sequence_number = 2;
}

message StatusResponse {
  int32 active_replicas = 1;
  string role = 2; // e.g., "PRIMARY" or "BACKUP"
  float load_percentage = 3;
}

message Empty {}
message Ping { string sender_id = 1; }
message Pong { bool alive = 1; }
